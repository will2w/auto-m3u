name: IPTV Auto Builder Pro

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FILTER_YOUTUBE: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl gawk wget ffmpeg opencc

      - name: Download Data
        run: |
          dl_safe() {
            if wget --no-check-certificate --quiet --timeout=15 --tries=3 \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 -O "$1" "$2"; then
                 tr -d '\000' < "$1" > "$1.tmp" && mv "$1.tmp" "$1"
                 sed -i 's/\r//g' "$1"
            else
                 touch "$1"
            fi
          }
          dl_safe "source_china.m3u"     "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/cn.m3u"
          dl_safe "source_hongkong.m3u"  "https://raw.githubusercontent.com/sammy0101/hk-iptv-auto/refs/heads/main/hk_live.m3u"
          dl_safe "source_taiwan.m3u"    "https://raw.githubusercontent.com/will2w/auto-m3u/refs/heads/main/HK.m3u8"
          dl_safe "source_freetv_cn.m3u" "https://t.freetv.fun/m3u/china_original.m3u"
          dl_safe "source_freetv_hk.m3u" "https://t.freetv.fun/m3u/hong_kong_original.m3u"
          dl_safe "source_freetv_tw.m3u" "https://t.freetv.fun/m3u/taiwan_original.m3u"
          dl_safe "epg.xml"              "https://epg.pw/xmltv/epg_CN.xml"

      - name: Build Playlist
        run: |
          set +e

          # === 【修正：黑名單邏輯優化】 ===
          # 1. 先將上一次運行失敗的 URL 追加到黑名單中
          [ -s failed_logs.txt ] && cat failed_logs.txt >> blacklist.txt
          
          # 2. 如果黑名單存在，進行排序與去重，防止檔案無限膨脹
          if [ -f blacklist.txt ]; then
              sort -u blacklist.txt -o blacklist.txt
          fi

          # 3. 清理舊的臨時數據（保留存在本地的 blacklist.txt，不刪除 failed_logs.txt 改用 touch 清空）
          rm -f playlist.m3u raw_extracted.txt valid_raw_data.txt pre_sort.txt final_list.txt
          touch raw_extracted.txt valid_raw_data.txt blacklist.txt failed_logs.txt
          echo "#EXTM3U" > playlist.m3u
          # ==================================

          normalize_id() {
              echo "$1" | sed -E 's/\[[^]]*\]//g; s/\([^)]*\)//g; s/\{[^}]*\}//g; s/【[^】]*】//g' | \
                         sed -E 's/(高清|超清|标清|FHD|UHD|HD|4K|2K|SD|1080P|720P)//ig' | \
                         tr -d ' \-()（）\{\}【】' | tr '[:lower:]' '[:upper:]'
          }

          detect_resolution() {
              local width=$(ffprobe -v error -select_streams v:0 -show_entries stream=width \
                            -of csv=s=x:p=0 -t 3 -timeout 3000000 "$1" 2>/dev/null | head -n 1)
              [ -z "$width" ] && echo 1 && return
              if [ "$width" -ge 3800 ]; then echo 5
              elif [ "$width" -ge 1900 ]; then echo 4
              elif [ "$width" -ge 1200 ]; then echo 3
              elif [ "$width" -ge 700 ]; then echo 2
              else echo 1; fi
          }
          export -f detect_resolution

          extract_m3u() {
              local AREA=$1 FILE=$2 WEIGHT=$3
              if [ -s "$FILE" ]; then
                  awk -v area="$AREA" -v weight="$WEIGHT" -v filter_youtube="$FILTER_YOUTUBE" \
                      '/^#EXTINF/ {
                          info=$0; gsub(/'\''/, "", info); getline url;
                          if (url ~ /^http/ && (url ~ /\.m3u8/ || url ~ /\.m3u8\?/)) {
                              if (filter_youtube == "true" && (url ~ /youtube\.com/ || url ~ /youtu\.be/)) next;
                              print area "\t" info "\t" url "\t" weight
                          }
                      }' "$FILE" >> raw_extracted.txt
              fi
          }

          extract_m3u "China" "source_china.m3u" 9
          extract_m3u "Hong Kong" "source_hongkong.m3u" 9
          extract_m3u "Taiwan" "source_taiwan.m3u" 9
          extract_m3u "China" "source_freetv_cn.m3u" 0
          extract_m3u "Hong Kong" "source_freetv_hk.m3u" 0
          extract_m3u "Taiwan" "source_freetv_tw.m3u" 0

          echo "Starting multi-threaded validation (M3U8 Only)..."
          cat raw_extracted.txt | xargs -d '\n' -n 1 -P 20 bash -c '
              IFS=$'\''\t'\'' read -r AREA INFO URL WEIGHT <<< "$1"
              [ -z "$URL" ] && exit
              RAW_NAME=$(echo "$INFO" | sed "s/.*,//")
              NAME_S=$(echo "$RAW_NAME" | opencc -c t2s.json 2>/dev/null)
              [ -z "$NAME_S" ] && NAME_S="$RAW_NAME"

              # === 【修正：只針對 URL 進行黑名單過濾】 ===
              IN_BLACK=0
              if [ -s blacklist.txt ]; then
                  grep -qF "$URL" blacklist.txt && IN_BLACK=1
              fi
              # ==========================================

              if [ "$IN_BLACK" -eq 0 ]; then
                  RESP=$(curl -s -L --connect-timeout 8 --max-time 15 \
                      -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                      "$URL" | head -n 10)
                  if echo "$RESP" | grep -qE "#EXTM3U|#EXT-X-STREAM-INF|#EXT-X-TARGETDURATION"; then
                      REAL_QUAL=$(detect_resolution "$URL")
                      if [ "$WEIGHT" = "9" ]; then SPEED=9000; else SPEED=2000; fi
                      echo -e "${SPEED}\t${REAL_QUAL}\t${AREA}\t${URL}\t${NAME_S}\t${WEIGHT}" >> valid_raw_data.txt
                  else
                      echo "$URL" >> failed_logs.txt
                  fi
              fi
          ' _
          echo "Validation complete."

          [ ! -s valid_raw_data.txt ] && echo "警告: 沒有有效 M3U8 頻道" && exit 0

          # 城市→省份映射表（中英文拼音）
          declare -A CITY_TO_PROV CITY_TO_PROV_PINYIN

          # 央視、直轄市
          CITY_TO_PROV["央视"]="央视"; CITY_TO_PROV_PINYIN["央视"]="01_yangshi"
          CITY_TO_PROV["cctv"]="央视"; CITY_TO_PROV_PINYIN["cctv"]="01_yangshi"
          CITY_TO_PROV["cgtn"]="央视"; CITY_TO_PROV_PINYIN["cgtn"]="01_yangshi"
          CITY_TO_PROV["北京"]="北京"; CITY_TO_PROV_PINYIN["北京"]="02_beijing"
          CITY_TO_PROV["beijing"]="北京"; CITY_TO_PROV_PINYIN["beijing"]="02_beijing"
          CITY_TO_PROV["上海"]="上海"; CITY_TO_PROV_PINYIN["上海"]="03_shanghai"
          CITY_TO_PROV["shanghai"]="上海"; CITY_TO_PROV_PINYIN["shanghai"]="03_shanghai"
          CITY_TO_PROV["天津"]="天津"; CITY_TO_PROV_PINYIN["天津"]="04_tianjin"
          CITY_TO_PROV["tianjin"]="天津"; CITY_TO_PROV_PINYIN["tianjin"]="04_tianjin"
          CITY_TO_PROV["重庆"]="重庆"; CITY_TO_PROV_PINYIN["重庆"]="05_chongqing"
          CITY_TO_PROV["chongqing"]="重庆"; CITY_TO_PROV_PINYIN["chongqing"]="05_chongqing"

          # 廣東
          CITY_TO_PROV_PINYIN["广东"]="06_guangdong"; CITY_TO_PROV_PINYIN["guangdong"]="06_guangdong"
          for city in "广州" "深圳" "东莞" "佛山" "中山" "珠海" "惠州" "汕头" "江门" "湛江" "茂名" "肇庆" "梅州" "汕尾" "河源" "阳江" "清远" "潮州" "揭阳" "云浮" "韶关"; do
              CITY_TO_PROV["$city"]="广东"; CITY_TO_PROV_PINYIN["$city"]="06_guangdong"
          done
          for city_en in "guangzhou" "shenzhen" "dongguan" "foshan" "zhongshan" "zhuhai" "huizhou" "shantou" "jiangmen" "zhanjiang" "maoming" "zhaoqing" "meizhou" "shanwei" "heyuan" "yangjiang" "qingyuan" "chaozhou" "jieyang" "yunfu" "shaoguan"; do
              CITY_TO_PROV["$city_en"]="广东"; CITY_TO_PROV_PINYIN["$city_en"]="06_guangdong"
          done

          # 浙江
          CITY_TO_PROV_PINYIN["浙江"]="07_zhejiang"; CITY_TO_PROV_PINYIN["zhejiang"]="07_zhejiang"
          for city in "杭州" "宁波" "温州" "嘉兴" "湖州" "绍兴" "金华" "衢州" "舟山" "台州" "丽水"; do
