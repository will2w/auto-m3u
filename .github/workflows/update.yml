          done

          # 河北
          CITY_TO_PROV_PINYIN["河北"]="15_hebei"; CITY_TO_PROV_PINYIN["hebei"]="15_hebei"
          for city in "石家庄" "唐山" "保定" "廊坊" "邯郸" "秦皇岛" "沧州" "张家口" "承德" "邢台" "衡水"; do
