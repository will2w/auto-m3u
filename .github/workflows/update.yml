          done

          # 湖北
          CITY_TO_PROV_PINYIN["湖北"]="11_hubei"; CITY_TO_PROV_PINYIN["hubei"]="11_hubei"
          for city in "武汉" "宜昌" "襄阳" "黄冈" "荆州" "孝感" "黄石" "十堰" "鄂州" "荆门" "咸宁" "随州" "恩施"; do
              CITY_TO_PROV["$city"]="湖北"; CITY_TO_PROV_PINYIN["$city"]="11_hubei"
          done
          for city_en in "wuhan" "yichang" "xiangyang" "huanggang" "jingzhou" "xiaogan" "huangshi" "shiyan" "ezhou" "jingmen" "xianning" "suizhou" "enshi"; do
              CITY_TO_PROV["$city_en"]="湖北"; CITY_TO_PROV_PINYIN["$city_en"]="11_hubei"
          done

          # 湖南
          CITY_TO_PROV_PINYIN["湖南"]="12_hunan"; CITY_TO_PROV_PINYIN["hunan"]="12_hunan"
          for city in "长沙" "株洲" "湘潭" "衡阳" "邵阳" "岳阳" "常德" "张家界" "益阳" "郴州" "永州" "怀化" "娄底"; do
              CITY_TO_PROV["$city"]="湖南"; CITY_TO_PROV_PINYIN["$city"]="12_hunan"
          done
          for city_en in "changsha" "zhuzhou" "xiangtan" "hengyang" "shaoyang" "yueyang" "changde" "zhangjiajie" "yiyang" "chenzhou" "yongzhou" "huaihua" "loudi"; do
              CITY_TO_PROV["$city_en"]="湖南"; CITY_TO_PROV_PINYIN["$city_en"]="12_hunan"
          done

          # 福建
          CITY_TO_PROV_PINYIN["福建"]="13_fujian"; CITY_TO_PROV_PINYIN["fujian"]="13_fujian"
          for city in "福州" "厦门" "泉州" "漳州" "莆田" "三明" "南平" "龙岩" "宁德"; do
              CITY_TO_PROV["$city"]="福建"; CITY_TO_PROV_PINYIN["$city"]="13_fujian"
          done
          for city_en in "fuzhou" "xiamen" "quanzhou" "zhangzhou" "putian" "sanming" "nanping" "longyan" "ningde"; do
              CITY_TO_PROV["$city_en"]="福建"; CITY_TO_PROV_PINYIN["$city_en"]="13_fujian"
          done

          # 遼寧
          CITY_TO_PROV_PINYIN["辽宁"]="14_liaoning"; CITY_TO_PROV_PINYIN["liaoning"]="14_liaoning"
          for city in "沈阳" "大连" "鞍山" "抚顺" "本溪" "丹东" "锦州" "营口" "盘锦" "阜新" "辽阳" "铁岭" "朝阳" "葫芦岛"; do
              CITY_TO_PROV["$city"]="辽宁"; CITY_TO_PROV_PINYIN["$city"]="14_liaoning"
          done
          for city_en in "shenyang" "dalian" "anshan" "fushun" "benxi" "dandong" "jinzhou" "yingkou" "panjin" "fuxin" "liaoyang" "tieling" "chaoyang" "huludao"; do
