          # 內蒙古
          CITY_TO_PROV_PINYIN["内蒙古"]="28_neimenggu"; CITY_TO_PROV_PINYIN["neimenggu"]="28_neimenggu"
          for city in "呼和浩特" "包頭" "乌海" "赤峰" "通辽" "鄂尔多斯" "呼伦贝尔" "巴彦淖尔" "乌兰察布"; do
