          done
          for city_en in "xining" "haidong"; do
              CITY_TO_PROV["$city_en"]="青海"; CITY_TO_PROV_PINYIN["$city_en"]="31_qinghai"
          done

          # 寧夏
          CITY_TO_PROV_PINYIN["宁夏"]="32_ningxia"; CITY_TO_PROV_PINYIN["ningxia"]="32_ningxia"
          for city in "银川" "石嘴山" "吴忠" "固原" "中卫"; do
              CITY_TO_PROV["$city"]="宁夏"; CITY_TO_PROV_PINYIN["$city"]="32_ningxia"
          done
          for city_en in "yinchuan" "shizuishan" "wuzhong" "guyuan" "zhongwei"; do
              CITY_TO_PROV["$city_en"]="宁夏"; CITY_TO_PROV_PINYIN["$city_en"]="32_ningxia"
          done

          # 香港
          CITY_TO_PROV["香港"]="香港"; CITY_TO_PROV_PINYIN["香港"]="33_xianggang"
          CITY_TO_PROV["hongkong"]="香港"; CITY_TO_PROV_PINYIN["hongkong"]="33_xianggang"
          CITY_TO_PROV["hong kong"]="香港"; CITY_TO_PROV_PINYIN["hong kong"]="33_xianggang"

          # 澳門
          CITY_TO_PROV["澳门"]="澳门"; CITY_TO_PROV_PINYIN["澳门"]="34_aomen"
          CITY_TO_PROV["macau"]="澳门"; CITY_TO_PROV_PINYIN["macau"]="34_aomen"
          CITY_TO_PROV["macao"]="澳门"; CITY_TO_PROV_PINYIN["macao"]="34_aomen"

          # 台灣
          CITY_TO_PROV["台湾"]="台湾"; CITY_TO_PROV_PINYIN["台湾"]="35_taiwan"
          CITY_TO_PROV["taiwan"]="台湾"; CITY_TO_PROV_PINYIN["taiwan"]="35_taiwan"
          for city in "台北" "高雄" "台中" "台南" "基隆" "新竹" "嘉义"; do
              CITY_TO_PROV["$city"]="台湾"; CITY_TO_PROV_PINYIN["$city"]="35_taiwan"
          done
          for city_en in "taipei" "kaohsiung" "taichung" "tainan" "keelung" "hsinchu" "chiayi"; do
              CITY_TO_PROV["$city_en"]="台湾"; CITY_TO_PROV_PINYIN["$city_en"]="35_taiwan"
          done

          # 其他
          CITY_TO_PROV["其他"]="其他"; CITY_TO_PROV_PINYIN["其他"]="99_other"

          echo "Assigning province groups..."
          while IFS=$'\t' read -r SPEED QUAL AREA URL NAME_S WEIGHT; do
              CLEAN_NAME=$(echo "$NAME_S" | sed -E 's/\[[^]]*\]//g; s/\([^)]*\)//g; s/\{[^}]*\}//g; s/【[^】]*】//g' | \
                           sed -E 's/(高清|超清|标清|FHD|UHD|HD|4K|2K|SD|1080P|720P)//ig' | \
                           sed -E 's/^[[:space:]\-]+|[[:space:]\-]+$//g')
              [ -z "$CLEAN_NAME" ] && continue
              MID=$(normalize_id "$CLEAN_NAME")
              UPPER_NAME=$(echo "$CLEAN_NAME" | tr '[:lower:]' '[:upper:]')
              LOWER_NAME=$(echo "$CLEAN_NAME" | tr '[:upper:]' '[:lower:]')
              GROUP="其他"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN["其他"]}"

              if [[ "$UPPER_NAME" == *"CCTV"* || "$UPPER_NAME" == *"CGTN"* || "$UPPER_NAME" == *"央视"* || "$UPPER_NAME" == *"中央"* ]]; then
                  GROUP="央视"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN["央视"]}"
              elif [[ "$AREA" == "Hong Kong" ]]; then
                  GROUP="香港"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN["香港"]}"
              elif [[ "$UPPER_NAME" == *"澳门"* || "$UPPER_NAME" == *"MACAU"* || "$UPPER_NAME" == *"MACAO"* ]]; then
                  GROUP="澳门"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN["澳门"]}"
              elif [[ "$AREA" == "Taiwan" || "$UPPER_NAME" == *"台湾"* || "$UPPER_NAME" == *"TAIWAN"* ]]; then
                  GROUP="台湾"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN["台湾"]}"
              elif [[ "$AREA" == "China" ]]; then
                  MATCHED=0
                  for municipality in "北京" "上海" "天津" "重庆" "beijing" "shanghai" "tianjin" "chongqing"; do
                      UPPER_municipality=$(echo "$municipality" | tr '[:lower:]' '[:upper:]')
                      if [[ "$UPPER_NAME" == *"$UPPER_municipality"* || "$LOWER_NAME" == *"$municipality"* ]]; then
                          case "$municipality" in beijing) municipality="北京";; shanghai) municipality="上海";; tianjin) municipality="天津";; chongqing) municipality="重庆";; esac
                          GROUP="$municipality"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN[$municipality]}"; MATCHED=1; break
                      fi
                  done
                  if [ "$MATCHED" -eq 0 ]; then
                      for city in "${!CITY_TO_PROV[@]}"; do
                          [[ "$city" == "央视" || "$city" == "香港" || "$city" == "澳门" || "$city" == "台湾" || "$city" == "其他" ]] && continue
                          UPPER_CITY=$(echo "$city" | tr '[:lower:]' '[:upper:]')
                          if [[ "$UPPER_NAME" == *"$UPPER_CITY"* || "$LOWER_NAME" == *"$city"* ]]; then
                              PROV="${CITY_TO_PROV[$city]}"; GROUP="$PROV"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN[$city]}"; MATCHED=1; break
                          fi
                      done
                  fi
                  if [ "$MATCHED" -eq 0 ]; then
                      for prov in "广东" "浙江" "江苏" "山东" "四川" "湖北" "湖南" "福建" "辽宁" "河北" "河南" "安徽" "江西" "陕西" "广西" "云南" "甘肃" "海南" "贵州" "山西" "吉林" "黑龙江" "内蒙古" "新疆" "西藏" "青海" "宁夏" \
                                 "guangdong" "zhejiang" "jiangsu" "shandong" "sichuan" "hubei" "hunan" "fujian" "liaoning" "hebei" "henan" "anhui" "jiangxi" "shaanxi" "guangxi" "yunnan" "gansu" "hainan" "guizhou" "shanxi" "jilin" "heilongjiang" "neimenggu" "xinjiang" "xizang" "qinghai" "ningxia"; do
                          UPPER_PROV=$(echo "$prov" | tr '[:lower:]' '[:upper:]')
                          if [[ "$UPPER_NAME" == *"$UPPER_PROV"* || "$LOWER_NAME" == *"$prov"* ]]; then
                              case "$prov" in
                                  "guangdong") PROV_CN="广东";; "zhejiang") PROV_CN="浙江";; "jiangsu") PROV_CN="江苏";;
                                  "shandong") PROV_CN="山东";; "sichuan") PROV_CN="四川";; "hubei") PROV_CN="湖北";;
                                  "hunan") PROV_CN="湖南";; "fujian") PROV_CN="福建";; "liaoning") PROV_CN="辽宁";;
                                  "hebei") PROV_CN="河北";; "henan") PROV_CN="河南";; "anhui") PROV_CN="安徽";;
                                  "jiangxi") PROV_CN="江西";; "shaanxi") PROV_CN="陕西";; "guangxi") PROV_CN="广西";;
                                  "yunnan") PROV_CN="云南";; "gansu") PROV_CN="甘肃";; "hainan") PROV_CN="海南";;
                                  "guizhou") PROV_CN="贵州";; "shanxi") PROV_CN="山西";; "jilin") PROV_CN="吉林";;
                                  "heilongjiang") PROV_CN="黑龙江";; "neimenggu") PROV_CN="内蒙古";; "xinjiang") PROV_CN="新疆";;
                                  "xizang") PROV_CN="西藏";; "qinghai") PROV_CN="青海";; "ningxia") PROV_CN="宁夏";;
                                  *) PROV_CN="$prov";;
                              esac
                              GROUP="$PROV_CN"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN[$PROV_CN]}"; MATCHED=1; break
                          fi
                      done
                  fi
                  [ "$MATCHED" -eq 0 ] && { GROUP="其他"; GROUP_PINYIN="${CITY_TO_PROV_PINYIN["其他"]}"; }
              fi
              echo -e "${MID}\t${QUAL}\t${SPEED}\t${WEIGHT}\t${GROUP_PINYIN}\t${GROUP}\t${CLEAN_NAME}\t${URL}" >> pre_sort.txt
          done < valid_raw_data.txt

          echo "Sorting and keeping top 3..."
          [ -s pre_sort.txt ] && sort -t $'\t' -k1,1 -k2,2nr -k3,3nr -k4,4nr pre_sort.txt | \
              awk -F '\t' '{ if (count[$1] < 3) { print; count[$1]++ } }' > final_list.txt || touch final_list.txt

          declare -A EPG_MAP
          if [ -s epg.xml ]; then
              while IFS='|' read -r ID DISPLAY_NAME; do
                  [[ -n "$ID" && -n "$DISPLAY_NAME" ]] && EPG_MAP["$DISPLAY_NAME"]="$ID"
              done < <(grep '<channel' epg.xml | sed -n 's/.*id="\([^"]*\)".*/\1/p' | while read -r cid; do
                  dname=$(grep -A1 "id=\"$cid\"" epg.xml | grep 'display-name' | head -1 | sed 's/.*<display-name[^>]*>\(.*\)<\/display-name>.*/\1/')
                  echo "${cid}|${dname}"
              done)
          fi

          echo "Generating final playlist..."
          if [ -s final_list.txt ]; then
              sort -t $'\t' -k5,5 -k6,6 -k2,2nr -k3,3nr final_list.txt | while IFS=$'\t' read -r MID QUAL SPEED WEIGHT GROUP_PINYIN GROUP NAME URL; do
                  TVG_ID=""
                  for epg_name in "${!EPG_MAP[@]}"; do
                      if [[ "$NAME" == *"$epg_name"* || "$epg_name" == *"$NAME"* ]]; then
                          TVG_ID="${EPG_MAP[$epg_name]}"; break
                      fi
                  done
                  ICON_NAME=$(echo "$NAME" | tr -dc '[:alnum:]' | tr '[:upper:]' '[:lower:]')
                  TVG_LOGO="https://raw.githubusercontent.com/fanmingming/live/main/tvicon/${ICON_NAME}.png"

                  if [[ -n "$TVG_ID" ]]; then
                      EXT="#EXTINF:-1 tvg-id=\"${TVG_ID}\" tvg-logo=\"${TVG_LOGO}\" group-title=\"${GROUP}\",${NAME}"
                  else
                      EXT="#EXTINF:-1 tvg-logo=\"${TVG_LOGO}\" group-title=\"${GROUP}\",${NAME}"
                  fi

                  URL_CLEAN=$(echo "$URL" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
                  printf '%s\n' "$EXT" >> playlist.m3u
                  printf '%s\n' "$URL_CLEAN" >> playlist.m3u
              done
          fi

          sed -i 's/\r//g; /^[[:space:]]*$/d' playlist.m3u

          TOTAL_CHANNELS=$(grep -c "^#EXTINF" playlist.m3u 2>/dev/null || echo 0)
          echo "=========================================="
          echo "✅ 完成！總頻道數: ${TOTAL_CHANNELS}"
          if [ -s failed_logs.txt ]; then echo "❌ 失敗鏈接: $(wc -l < failed_logs.txt)"; fi
          echo "=========================================="

          rm -f source_*.m3u epg.xml valid_raw_data.txt pre_sort.txt final_list.txt raw_extracted.txt

      - name: Commit and Push Playlist
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          [ ! -f playlist.m3u ] && echo "⚠️ playlist.m3u 未生成！" && exit 1
          CHANNEL_COUNT=$(grep -c "^#EXTINF" playlist.m3u 2>/dev/null || echo 0)
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          
          # === 【修正：將黑名單加入 Git 暫存庫】 ===
          git add playlist.m3u
          [ -f failed_logs.txt ] && git add failed_logs.txt
          [ -f blacklist.txt ] && git add blacklist.txt
          # =======================================
          
          if git diff --cached --quiet; then
            echo "📭 沒有變更"
          else
            git commit -m "🔄 Update: ${CHANNEL_COUNT} M3U8 channels | ${TIMESTAMP}"
            git pull --rebase origin main 2>/dev/null || git pull --rebase origin master 2>/dev/null
            git push
          fi
