              CITY_TO_PROV["$city"]="河南"; CITY_TO_PROV_PINYIN["$city"]="16_henan"
          done
          for city_en in "zhengzhou" "luoyang" "nanyang" "xinxiang" "xuchang" "anyang" "pingdingshan" "kaifeng" "hebi" "jiaozuo" "puyang" "luohe" "sanmenxia" "shangqiu" "xinyang" "zhoukou" "zhumadian"; do
