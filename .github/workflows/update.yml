name: IPTV Auto Builder Pro

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl gawk findutils wget

      - name: Download Data
        run: |
          echo "Downloading sources..."
          dl_safe() {
            if wget --no-check-certificate --quiet --timeout=15 --tries=3 \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 -O "$1" "$2"; then
                 echo "Downloaded $1"
            else
                 echo "Warning: $1 failed, skipping."
                 touch "$1"
            fi
          }
          dl_safe "source_china.m3u"    "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/cn.m3u"
          dl_safe "source_hongkong.m3u" "https://raw.githubusercontent.com/sammy0101/hk-iptv-auto/refs/heads/main/hk_live.m3u"
          dl_safe "source_taiwan.m3u"   "https://raw.githubusercontent.com/will2w/auto-m3u/refs/heads/main/HK.m3u8"
          dl_safe "source_freetv_cn.m3u" "https://t.freetv.fun/m3u/playlist_banned_cn_original.m3u"
          dl_safe "source_freetv_hk.m3u" "https://t.freetv.fun/m3u/hong_kong_original.m3u"
          dl_safe "source_freetv_tw.m3u" "https://t.freetv.fun/m3u/taiwan_original.m3u"
          dl_safe "epg.xml"             "https://epg.pw/xmltv/epg_CN.xml"
          sed -i 's/\r//g' source_*.m3u

      - name: Build Playlist
        run: |
          touch previous_urls.txt
          [ -f playlist.m3u ] && grep -E '^http' playlist.m3u > previous_urls.txt || true
          echo "#EXTM3U" > playlist.m3u
          touch raw_extracted.txt

          # 提取並清理名稱
          normalize_id() {
              echo "$1" | sed -E 's/\[[^]]*\]//g; s/\([^)]*\)//g; s/(高清|HD|超清|UHD|4K|FHD|标清|SD)//ig' | tr -d ' \-()（）' | tr '[:lower:]' '[:upper:]'
          }
          export -f normalize_id

          extract_m3u() {
              [ -s "$2" ] && awk -v area="$1" '/^#EXTINF/ {info=$0; gsub(/'"'"'/, "", info); getline url; if (url ~ /^http/) print area "\t" url "\t" info}' "$2" >> raw_extracted.txt
          }
          extract_m3u "China" "source_china.m3u"; extract_m3u "Hong Kong" "source_hongkong.m3u"; extract_m3u "Taiwan" "source_taiwan.m3u"
          extract_m3u "China" "source_freetv_cn.m3u"; extract_m3u "Hong Kong" "source_freetv_hk.m3u"; extract_m3u "Taiwan" "source_freetv_tw.m3u"

          test_stream() {
              IFS=$'\t' read -r AREA URL INFO <<< "$1"
              [[ "$URL" == *"youtube.com"* || "$URL" == *"youtu.be"* ]] && { echo -e "5000000\t${AREA}\t${URL}\t${INFO}"; return; }
              CHECK=$(curl -s -I -w "%{http_code}\t%{speed_download}" -o /dev/null --connect-timeout 3 --max-time 4 "$URL" || echo -e "000\t0")
              HTTP=$(echo "$CHECK" | cut -f1); SPEED=$(echo "$CHECK" | cut -f2 | awk '{print int($1)}')
              [[ "$HTTP" =~ ^(200|301|302)$ ]] && echo -e "${SPEED:-1000}\t${AREA}\t${URL}\t${INFO}"
          }
          
          # 測試並標準化名稱，放入預排序
          while IFS=$'\t' read -r AREA URL INFO; do
              # 進行速度測試
              RESULT=$(test_stream "$AREA\t$URL\t$INFO")
              [ -z "$RESULT" ] && continue
              
              SPEED=$(echo "$RESULT" | cut -f1)
              # 提取並標準化名稱
              NAME_RAW=$(echo "$INFO" | sed 's/.*,//')
              CLEAN=$(echo "$NAME_RAW" | sed -E 's/\[[^]]*\]|\([^)]*\)|\{[^}]*\}|【[^】]*】//g; s/(高清|超清|标清|FHD|UHD|HD|4K|2K|SD)//ig; s/^[[:space:]\-]+|[[:space:]\-]+$//g')
              MID=$(normalize_id "$CLEAN")
              U_NAME=$(echo "$CLEAN" | tr '[:lower:]' '[:upper:]')
              
              # 分組
              GROUP="全国"; SORT=4
              [[ "$U_NAME" == *"CCTV"* || "$U_NAME" == *"CGTN"* ]] && { GROUP="央视"; SORT=1; } || [[ "$AREA" == "Hong Kong" || "$U_NAME" == *"澳門"* ]] && { GROUP="港澳"; SORT=2; } || [[ "$AREA" == "Taiwan" ]] && { GROUP="台湾"; SORT=3; }
              
              grep -Fxq "$URL" previous_urls.txt 2>/dev/null && PRIO=1 || PRIO=0
              echo -e "${MID}\t${PRIO}\t${SPEED}\t${SORT}\t${GROUP}\t${CLEAN}\t${URL}" >> pre_sort.txt
          done < raw_extracted.txt

          # 對標準化後的 MID 進行篩選，每個頻道 ID 只取速度最快的前 5
          sort -t $'\t' -k1,1 -k2,2nr -k3,3nr pre_sort.txt | awk -F '\t' '{ if (count[$1] < 5) { print; count[$1]++; } }' > final_list.txt

          # 構建播放列表
          declare -A EPG
          [ -f epg.xml ] && while IFS='|' read -r i n; do EPG["$n"]="$i"; done < <(gawk 'match($0, /id="([^"]+)"/, a) {id=a[1]} match($0, /<display-name[^>]*>([^<]+)<\/display-name>/, b) {print id "|" b[1]}' epg.xml)
          
          sort -t $'\t' -k4,4n -k5,5 -k6,6 final_list.txt | while IFS=$'\t' read -r MID PRIO SPD SORT GRP NAME URL; do
              [[ "$GRP" != "$CUR" ]] && { echo -e "\n# ===== $GRP =====" >> playlist.m3u; CUR="$GRP"; }
              ICON=$(echo "$NAME" | tr -dc '[:alnum:]')
              EXT="#EXTINF:-1 $([[ -n "${EPG[$NAME]}" ]] && echo "tvg-id=\"${EPG[$NAME]}\"") tvg-logo=\"https://raw.githubusercontent.com/fanmingming/live/main/tvicon/${ICON}.png\" group-title=\"$GRP\",$NAME"
              echo -e "$EXT\n$URL" >> playlist.m3u
          done
          rm -f source_*.m3u epg.xml previous_urls.txt raw_extracted.txt pre_sort.txt final_list.txt

      - name: Commit and Push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          if ! git diff --quiet playlist.m3u; then
            git add playlist.m3u
            git commit -m "🚀 Update: Normalized IPTV list ($(date +'%Y-%m-%d %H:%M'))"
            git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
            git pull --rebase origin main && git push origin main
          fi
