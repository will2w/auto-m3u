name: IPTV Auto Builder Pro

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Tools
        run: |
          sudo apt-get update
          # 加入 opencc 用於全量繁簡轉換
          sudo apt-get install -y jq curl gawk findutils wget ffmpeg opencc

      - name: Download Data
        run: |
          echo "Downloading sources..."
          dl_safe() {
            if wget --no-check-certificate --quiet --timeout=15 --tries=3 \
                 --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 -O "$1" "$2"; then
                 echo "Downloaded $1"
                 # 清理非法空字元與 Windows 換行符 (解決 null byte 警告)
                 tr -d '\000' < "$1" > "$1.tmp" && mv "$1.tmp" "$1"
                 sed -i 's/\r//g' "$1"
            else
                 echo "Warning: $1 failed, skipping."
                 touch "$1"
            fi
          }
          dl_safe "source_china.m3u"    "https://raw.githubusercontent.com/iptv-org/iptv/master/streams/cn.m3u"
          dl_safe "source_hongkong.m3u" "https://raw.githubusercontent.com/sammy0101/hk-iptv-auto/refs/heads/main/hk_live.m3u"
          dl_safe "source_taiwan.m3u"   "https://raw.githubusercontent.com/will2w/auto-m3u/refs/heads/main/HK.m3u8"
          dl_safe "source_freetv_cn.m3u" "https://t.freetv.fun/m3u/china_original.m3u"
          dl_safe "source_freetv_hk.m3u" "https://t.freetv.fun/m3u/hong_kong_original.m3u"
          dl_safe "source_freetv_tw.m3u" "https://t.freetv.fun/m3u/taiwan_original.m3u"
          dl_safe "epg.xml"             "https://epg.pw/xmltv/epg_CN.xml"

      - name: Build Playlist
        run: |
          set +e
          # 建立必要文件
          rm -f playlist.m3u previous_urls.txt raw_extracted.txt raw_extracted_raw.txt pre_sort.txt final_list.txt valid_raw_data.txt failed_logs.txt
          touch previous_urls.txt raw_extracted.txt raw_extracted_raw.txt pre_sort.txt blacklist.txt failed_logs.txt
          [ -f playlist.m3u ] && grep -E '^http' playlist.m3u > previous_urls.txt || true
          
          # [優化 1] 加入 UTF-8 BOM 標頭，解決部分 IPTV 播放器無法識別清單的問題
          printf "\xEF\xBB\xBF#EXTM3U\n" > playlist.m3u
          
          # 載入歷史失敗記錄作為黑名單
          [ -f failed_logs.txt ] && cat failed_logs.txt >> blacklist.txt

          normalize_id() {
              echo "$1" | sed -E 's/\[[^]]*\]//g; s/\([^)]*\)//g; s/(高清|HD|超清|UHD|4K|FHD|标清|SD)//ig' | tr -d ' \-()（）' | tr '[:lower:]' '[:upper:]'
          }
          
          # [防護優化] 偵測解析度函數 (時間放寬至 3 秒，避免過場動畫)
          detect_resolution() {
              local width=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=s=x:p=0 -t 3 -timeout 3000000 "$1" 2>/dev/null | head -n 1)
              [ -z "$width" ] && echo 1 && return
              if [ "$width" -ge 3800 ]; then echo 5
              elif [ "$width" -ge 1900 ]; then echo 4
              elif [ "$width" -ge 1200 ]; then echo 3
              elif [ "$width" -ge 700 ]; then echo 2
              else echo 1; fi
          }
          export -f detect_resolution
          
          extract_m3u() {
              local weight=$3
              [ -s "$2" ] && awk -v w="$weight" '/^#EXTINF/ {info=$0; gsub(/'\''/, "", info); getline url; if (url ~ /^http/) print url "\t" info "\t" w}' "$2" >> raw_extracted_raw.txt
          }
          extract_m3u "China" "source_china.m3u" 9; extract_m3u "Hong Kong" "source_hongkong.m3u" 9; extract_m3u "Taiwan" "source_taiwan.m3u" 9
          extract_m3u "China" "source_freetv_cn.m3u" 0; extract_m3u "Hong Kong" "source_freetv_hk.m3u" 0; extract_m3u "Taiwan" "source_freetv_tw.m3u" 0

          # === 【核心修正點】全量轉換成簡體字 ===
          if [ -s raw_extracted_raw.txt ]; then
              opencc -c t2s.json -i raw_extracted_raw.txt -o raw_extracted.txt
          else
              touch raw_extracted.txt
          fi

          # [防護優化] 全面改用「智能降級」取代「硬攔截」，防止誤殺
          echo "Starting multi-threaded validation with smart quality detection..."
          cat raw_extracted.txt | xargs -d '\n' -n 1 -P 20 bash -c '
              IFS=$'\''\t'\'' read -r URL INFO WEIGHT <<< "$1"
              [ -z "$URL" ] && exit 0
              
              NAME_RAW=$(echo "$INFO" | sed "s/.*,//")
              
              # 黑名單攔截 (確保效率)
              if [ -s blacklist.txt ]; then
                  grep -qF "$NAME_RAW" blacklist.txt && exit 0
                  grep -qF "$URL" blacklist.txt && exit 0
              fi

              # 步驟一：嚴格連線驗證 (防護底線，確保是活的串流)
              # [優化 2] 增加 Timeout 到 8/15 秒，避免伺服器回應較慢導致被誤刪
              RESP=$(curl -s -L --connect-timeout 8 --max-time 15 \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                  -H "Referer: https://www.google.com/" \
                  "$URL")
              
              if ! echo "$RESP" | grep -qE "#EXTM3U|#EXT-X-STREAM-INF"; then
                  echo "$URL" >> failed_logs.txt
                  exit 0
              fi

              # [取消誤殺點]：移除對聚合源的 URL 關鍵字硬性交叉比對。
              
              # 步驟二：對存活的頻道進行真實畫質評估
              # [取消誤殺點]：不再因為探測為低畫質而刪除頻道，而是將真實分數往後傳遞
              REAL_QUAL=$(detect_resolution "$URL")

              # 輸出格式：速度(預設) \t 網址 \t 資訊 \t 原本權重 \t 實測畫質
              echo -e "2000\t${URL}\t${INFO}\t${WEIGHT}\t${REAL_QUAL}"
          ' _ > valid_raw_data.txt
          echo "Validation complete."

          # 34 省級行政區完整分類函數 (源頭已轉簡體，此處僅保留簡體/拼音/英文精準匹配)
          get_grp() {
              local n=$(echo "$1" | tr '[:upper:]' '[:lower:]')
              if [[ "$n" =~ (cctv|cgtn|央视|yangshi) ]]; then echo "央视";
              elif [[ "$n" =~ (澳门|tvb|vtv|hk|港|macau|macao|hongkong) ]]; then echo "港澳";
              elif [[ "$n" =~ (台|民视|三立|东森|中视|华视|公视|tvbs|taiwan|tw|台湾) ]]; then echo "台湾";
              elif [[ "$n" =~ (北京|上海|天津|重庆|beijing|shanghai|tianjin|chongqing) ]]; then echo "直辖市";
              elif [[ "$n" =~ (广东|广州|深圳|东莞|佛山|中山|珠海|惠州|汕头|江门|湛江|茂名|肇庆|梅州|汕尾|河源|阳江|清远|潮州|揭阳|云浮|guangdong|guangzhou|shenzhen|dongguan|foshan|zhongshan|zhuhai) ]]; then echo "广东";
              elif [[ "$n" =~ (江苏|南京|苏州|无锡|常州|徐州|南通|连云港|淮安|盐城|扬州|镇江|泰州|宿迁|jiangsu|nanjing|suzhou|wuxi|changzhou|xuzhou|nantong) ]]; then echo "江苏";
              elif [[ "$n" =~ (浙江|杭州|宁波|温州|嘉兴|湖州|绍兴|金华|衢州|舟山|台州|丽水|zhejiang|hangzhou|ningbo|wenzhou|jiaxing|huzhou|shaoxing|jinhua) ]]; then echo "浙江";
              elif [[ "$n" =~ (山东|济南|青岛|淄博|枣庄|东营|烟台|潍坊|济宁|泰安|威海|日照|临沂|德州|聊城|滨州|菏泽|shandong|jinan|qingdao|zibo|yantai|weifang|jining|linyi) ]]; then echo "山东";
              elif [[ "$n" =~ (四川|成都|绵阳|德阳|南充|宜宾|乐山|达州|自贡|攀枝花|泸州|广元|遂宁|内江|眉山|广安|雅安|巴中|资阳|阿坝|甘孜|凉山|sichuan|chengdu|mianyang|deyang|nanchong|yibin) ]]; then echo "四川";
              elif [[ "$n" =~ (湖北|武汉|宜昌|襄阳|黄冈|荆州|孝感|黄石|十堰|鄂州|荆门|咸宁|随州|恩施|hubei|wuhan|yichang|xiangyang|jingzhou|huangshi) ]]; then echo "湖北";
              elif [[ "$n" =~ (湖南|长沙|株洲|湘潭|衡阳|邵阳|岳阳|常德|张家界|益阳|郴州|永州|怀化|娄底|湘西|hunan|changsha|zhuzhou|xiangtan|hengyang|yueyang|changde) ]]; then echo "湖南";
              elif [[ "$n" =~ (福建|福州|厦门|泉州|漳州|莆田|三明|南平|龙岩|宁德|fujian|fuzhou|xiamen|quanzhou|zhangzhou|putian|nanping) ]]; then echo "福建";
              elif [[ "$n" =~ (辽宁|沈阳|大连|鞍山|抚顺|本溪|丹东|锦州|营口|盘锦|阜新|辽阳|铁岭|朝阳|葫芦岛|liaoning|shenyang|dalian|anshan|fushun|dandong|jinzhou) ]]; then echo "辽宁";
              elif [[ "$n" =~ (河北|石家庄|唐山|保定|廊坊|and|秦皇岛|沧州|张家口|承德|邢台|衡水|hebei|shijiazhuang|tangshan|baoding|langfang|handan|qinhuangdao|cangzhou) ]]; then echo "河北";
              elif [[ "$n" =~ (河南|郑州|洛阳|南阳|新乡|许昌|安阳|平顶山|开封|鹤壁|焦作|濮阳|漯河|三门峡|商丘|信阳|周口|驻马店|henan|zhengzhou|luoyang|nanyang|xinxiang|xuchang|anyang|kaifeng) ]]; then echo "河南";
              elif [[ "$n" =~ (安徽|合肥|芜湖|蚌埠|淮南|马鞍山|安庆|黄山|滁州|阜阳|宿州|六安|亳州|池州|宣城|淮北|铜陵|anhui|hefei|wuhu|bengbu|huainan|anqing|huangshan|fuyang) ]]; then echo "安徽";
              elif [[ "$n" =~ (江西|南昌|赣州|九江|宜春|上饶|景德镇|萍乡|新余|鹰潭|吉安|抚州|jiangxi|nanchang|ganzhou|jiujiang|yichun|shangrao|jingdezhen) ]]; then echo "江西";
              elif [[ "$n" =~ (陕西|西安|宝鸡|咸阳|渭南|延安|汉中|榆林|安康|商洛|铜川|shaanxi|shanxi|xian|baoji|xianyang|weinan|yanan|hanzhong|yulin) ]]; then echo "陕西";
              elif [[ "$n" =~ (广西|南宁|柳州|桂林|北海|防城港|钦州|贵港|玉林|百色|贺州|河池|来宾|崇左|梧州|guangxi|nanning|liuzhou|guilin|beihai|qinzhou|yulin) ]]; then echo "广西";
              elif [[ "$n" =~ (云南|昆明|曲靖|玉溪|保山|昭通|丽江|普洱|临沧|楚雄|红河|文山|西双版纳|大理|德宏|怒江|迪庆|yunnan|kunming|qujing|yuxi|baoshan|zhaotong|lijiang|puer|dali) ]]; then echo "云南";
              elif [[ "$n" =~ (甘肃|兰州|嘉峪关|金昌|白银|天水|武威|张掖|平凉|酒泉|庆阳|定西|陇南|临夏|甘南|gansu|lanzhou|jiayuguan|tianshui|wuwei|zhangye|jiuquan) ]]; then echo "甘肃";
              elif [[ "$n" =~ (海南|海口|三亚|三沙|儋州|hainan|haikou|sanya|sansha|danzhou) ]]; then echo "海南";
              elif [[ "$n" =~ (贵州|贵阳|六盘水|遵义|安顺|毕节|铜仁|黔东南|黔南|黔西南|guizhou|guiyang|liupanshui|zunyi|anshun|bijie|tongren) ]]; then echo "贵州";
              elif [[ "$n" =~ (西藏|拉萨|日喀则|昌都|林芝|山南|那曲|阿里|xizang|tibet|lasa|rikaze|changdu|linzhi) ]]; then echo "西藏";
              elif [[ "$n" =~ (青海|西宁|海东|海北|黄南|海南|果洛|玉树|海西|qinghai|xining|haidong|yushu) ]]; then echo "青海";
              elif [[ "$n" =~ (宁夏|银川|石嘴山|吴忠|固原|中卫|ningxia|yinchuan|shizuishan|wuzhong|guyuan|zhongwei) ]]; then echo "宁夏";
              elif [[ "$n" =~ (新疆|乌鲁木齐|克拉玛依|吐鲁番|哈密|昌吉|博尔塔拉|巴音郭楞|阿克苏|克孜勒苏|喀什|和田|伊犁|塔城|阿勒泰|xinjiang|wulumuqi|kelamayi|tulufan|hami|kashi|heti|yili) ]]; then echo "新疆";
              elif [[ "$n" =~ (山西|太原|大同|阳泉|长治|晋城|朔州|晋中|运城|忻州|临汾|吕梁|shanxi|taiyuan|datong|yangquan|changzhi|jincheng|shuozhou|yuncheng|linfen) ]]; then echo "山西";
              elif [[ "$n" =~ (吉林|长春|四平|辽源|通化|白山|松原|白城|延边|jilin|changchun|siping|liaoyuan|tonghua|baishan|songyuan|baicheng|yanbian) ]]; then echo "吉林";
              elif [[ "$n" =~ (黑龙江|哈尔滨|齐齐哈尔|鸡西|鹤岗|双鸭山|大庆|伊春|佳木斯|七台河|牡丹江|黑河|绥化|heilongjiang|haerbin|harbin|qiqihar|jixi|hegang|daqing|yichun|jiamusi|mudanjiang|heihe) ]]; then echo "黑龙江";
              elif [[ "$n" =~ (内蒙古|呼和浩特|包头|乌海|赤峰|通辽|鄂尔多斯|呼伦贝尔|巴彦淖尔|乌兰察布|neimenggu|innermongolia|huhehaote|baotou|wuhai|chifeng|tongliao|eerduosi|hulunbeier) ]]; then echo "内蒙古";
              else echo "其他"; fi
          }

          # 接收來自多線程的資料：加入了實測畫質 (QUAL)
          while IFS=$'\t' read -r SPEED URL INFO WEIGHT QUAL; do
              [ -z "$URL" ] && continue
              NAME_RAW=$(echo "$INFO" | sed 's/.*,//')
              U_NAME=$(echo "$NAME_RAW" | tr '[:lower:]' '[:upper:]' || echo "")
              
              # 防呆機制：如果實測畫質為空，預設給 1 (標清)
              [ -z "$QUAL" ] && QUAL=1
              
              CLEAN=$(echo "$NAME_RAW" | sed -E 's/\[[^]]*\]|\([^)]*\)|\{[^}]*\}|【[^】]*】//g; s/(高清|超清|标清|FHD|UHD|HD|4K|2K|SD)//ig; s/^[[:space:]\-]+|[[:space:]\-]+$//g')
              MID=$(normalize_id "$CLEAN")
              
              # 獲取分類並分配排序權重
              GROUP=$(get_grp "$U_NAME")
              SORT=4
              [[ "$GROUP" == "央视" ]] && SORT=1
              [[ "$GROUP" == "港澳" ]] && SORT=2
              [[ "$GROUP" == "台湾" ]] && SORT=3
              
              grep -Fxq "$URL" previous_urls.txt 2>/dev/null && PRIO=1 || PRIO=0
              echo -e "${MID}\t${PRIO}\t${WEIGHT}\t${QUAL}\t${SPEED}\t${SORT}\t${GROUP}\t${CLEAN}\t${URL}" >> pre_sort.txt
          done < valid_raw_data.txt

          # 排序邏輯 (-k4,4nr 將根據我們實測的畫質 QUAL 由高到低排序)
          [ -s pre_sort.txt ] && sort -t $'\t' -k1,1 -k2,2nr -k3,3nr -k4,4nr -k5,5nr pre_sort.txt | awk -F '\t' '{ if (count[$1] < 3) { print; count[$1]++; } }' > final_list.txt

          declare -A EPG
          [ -f epg.xml ] && while IFS='|' read -r i n; do EPG["$n"]="$i"; done < <(gawk 'match($0, /id="([^"]+)"/, a) {id=a[1]} match($0, /<display-name[^>]*>([^<]+)<\/display-name>/, b) {print id "|" b[1]}' epg.xml)
          
          # 輸出為 M3U8
          if [ -s final_list.txt ]; then
              # [優化 3] 加入 -k7,7，確保同一個 group-title 的頻道會黏在一起，不會重複輸出標題
              sort -t $'\t' -k6,6n -k7,7 -k4,4nr -k2,2nr -k8,8 final_list.txt | while IFS=$'\t' read -r MID PRIO WEIGHT QUAL SPD SORT GRP NAME URL; do
                  [[ "$GRP" != "$CUR" ]] && { 
                      echo -e "\n#EXTINF:-1 group-title=\"$GRP\",--- $GRP ---\n" >> playlist.m3u
                      CUR="$GRP"
                  }
                  
                  ICON=$(echo "$NAME" | tr -dc '[:alnum:]' || echo "default")
                  EXT="#EXTINF:-1 $([[ -n "${EPG[$NAME]}" ]] && echo "tvg-id=\"${EPG[$NAME]}\"") tvg-logo=\"https://raw.githubusercontent.com/fanmingming/live/main/tvicon/${ICON}.png\" group-title=\"$GRP\",$NAME"
                  echo -e "$EXT\n$URL" >> playlist.m3u
              done
          fi
          set -e

      - name: Commit and Push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 檢查是否有變更
          if [[ -n $(git status -s) ]]; then
            git add playlist.m3u failed_logs.txt
            git commit -m "🚀 Update: OpenCC T2S Pre-processed & Smart Sorting ($(date +'%Y-%m-%d %H:%M'))"
            
            # 使用 --force-with-lease 安全地推送到遠端
            git push origin main || git push origin main --force
          else
            echo "No changes to commit."
          fi
